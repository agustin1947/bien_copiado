version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: strapi_postgres
    restart: always
    environment:
      POSTGRES_DB: strapi_db
      POSTGRES_USER: strapi_user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  strapi:
    build: .
    container_name: strapi_app
    working_dir: /app
    volumes:
      - ./:/app
      - /app/node_modules
    ports:
      - "1337:1337"
    env_file:
      - .env
    depends_on:
      - postgres
volumes:
  postgres_data: